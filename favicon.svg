<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Gradient sesuai brand website (Indigo ke Purple) -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <!-- Subtle glow effect untuk kedalaman -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background rounded square (sesuai warna body website) -->
  <rect width="64" height="64" rx="16" fill="#0a0a0f" stroke="#ffffff15" stroke-width="1" />

  <!-- Monogram AW Geometris -->
  <g filter="url(#glow)">
    <!-- Huruf A -->
    <path d="M 4 54 L 18 14 L 32 54 L 25 54 L 22 44 L 14 44 L 11 54 Z" fill="url(#brandGrad)" />
    
    <!-- Huruf W (dengan gap tipis 2px dari A agar tetap terbaca jelas di ukuran 16x16) -->
    <path d="M 34 54 L 40 14 L 48 38 L 56 14 L 62 54 L 54 54 L 52 42 L 48 26 L 44 42 L 42 54 Z" fill="url(#brandGrad)" />
  </g>
</svg>